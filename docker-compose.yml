services:

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

  gateway:
    build: ./node-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: PricePilot_2026_Secure_91Xq
      MONGO_URI: mongodb://mongodb:27017/productaggregator?directConnection=true
    depends_on:
      - mongodb
      - collector

  collector:
    build: ./python-service
    depends_on:
      - redis

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data: